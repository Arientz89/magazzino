<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Magazzino – Le Tele di Margi</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1a1a1a;--ink2:#555;--ink3:#999;--bg:#f5f3ef;--surface:#ffffff;--accent:#b5341c;--border:#ddd9d2;--found-bg:#fff3cd;--found-text:#7a5a00;--radius:10px}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
header{background:var(--accent);padding:18px 24px 14px;position:sticky;top:0;z-index:100}
.logo{font-family:'DM Mono',monospace;font-size:11px;color:rgba(255,255,255,.65);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
.search-wrap{display:flex;align-items:center;gap:10px;background:#fff;border-radius:var(--radius);padding:0 14px;height:48px;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.search-wrap svg{color:#aaa;flex-shrink:0}
#q{flex:1;border:none;outline:none;font-size:17px;font-family:inherit;color:var(--ink);background:transparent;caret-color:var(--accent)}
#q::placeholder{color:#bbb}
#clr{border:none;background:none;cursor:pointer;color:#bbb;font-size:20px;line-height:1;padding:4px;display:none}
#clr:hover{color:var(--ink)}
.chips{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center}
.fl{font-size:11px;color:rgba(255,255,255,.65);font-family:'DM Mono',monospace;letter-spacing:.08em;margin-right:2px}
.chip{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:3px 12px;font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;transition:all .15s;user-select:none}
.chip:hover,.chip.on{background:#fff;color:var(--accent);border-color:#fff}
#bar{padding:9px 24px;font-size:12px;color:var(--ink3);font-family:'DM Mono',monospace;border-bottom:1px solid var(--border);background:var(--bg);letter-spacing:.04em}
#bar b{color:var(--accent)}
#res{padding:18px 24px;display:flex;flex-direction:column;gap:9px}
.welcome{text-align:center;padding:56px 20px;color:var(--ink3)}
.welcome .ico{font-size:44px;margin-bottom:10px}
.welcome p{font-size:15px;line-height:1.75}
.welcome strong{color:var(--ink2)}
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:13px 16px;display:flex;align-items:flex-start;gap:13px;animation:fi .12s ease}
.card:hover{border-color:#bbb;box-shadow:0 2px 10px rgba(0,0,0,.07)}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.badge{flex-shrink:0;display:flex;flex-direction:column;align-items:center;background:var(--accent);color:#fff;border-radius:8px;padding:8px 10px;min-width:56px;text-align:center}
.bs{font-family:'DM Mono',monospace;font-size:17px;font-weight:500;line-height:1}
.br,.bc{font-size:10px;opacity:.75;letter-spacing:.1em;font-family:'DM Mono',monospace;margin-top:3px}
.cb{flex:1;min-width:0}
.cl{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);letter-spacing:.05em;margin-bottom:5px}
.ct{font-size:14px;line-height:1.65;color:var(--ink);word-break:break-word}
mark{background:var(--found-bg);color:var(--found-text);border-radius:3px;padding:0 2px;font-weight:500}
.empty{text-align:center;padding:44px 20px;color:var(--ink3)}
.empty .ico{font-size:38px;margin-bottom:8px}
.empty p{font-size:14px}
@media(max-width:520px){header{padding:12px 14px 10px}#res,#bar{padding-left:14px;padding-right:14px}.badge{min-width:48px;padding:6px 8px}.bs{font-size:14px}}</style>
</head>

const scaffali=[...new Set(INV.map(r=>r[0]))].sort((a,b)=>{
  const la=a.replace(/\d+/g,''),lb=b.replace(/\d+/g,'');
  const na=parseInt(a.replace(/\D/g,'')||0),nb=parseInt(b.replace(/\D/g,'')||0);
  return la!==lb?la.localeCompare(lb):na-nb;
});
let activeSc=null;
const chipsEl=document.getElementById('chips');
scaffali.forEach(s=>{
  const ch=document.createElement('button');
  ch.className='chip';ch.textContent=s;
  ch.onclick=()=>{
    activeSc=activeSc===s?null:s;
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
    if(activeSc)ch.classList.add('on');
    go();
  };
  chipsEl.appendChild(ch);
});
const qEl=document.getElementById('q');
const clrEl=document.getElementById('clr');
const resEl=document.getElementById('res');
const barEl=document.getElementById('bar');
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function hlite(text,terms){
  let out=esc(text);
  terms.forEach(t=>{
    if(!t)return;
    const re=new RegExp(esc(norm(t)).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
    out=out.replace(re,m=>'<mark>'+m+'</mark>');
  });
  return out;
}
function go(){
  const raw=qEl.value.trim();
  clrEl.style.display=raw?'block':'none';
  const terms=raw.split(/\s+/).filter(Boolean);
  let rows=INV.filter(r=>r[3].trim()!=='');
  if(activeSc)rows=rows.filter(r=>r[0]===activeSc);
  if(terms.length) rows=rows.filter(r=>terms.every(t=>norm(r[0]+r[1]+r[2]+r[3]).includes(norm(t))));
  if(!raw&&!activeSc){
    barEl.innerHTML='<b>'+INV.filter(r=>r[3].trim()!=='').length+'</b> posizioni totali &mdash; inizia a digitare per cercare';
    resEl.innerHTML='<div class="welcome"><div class="ico">&#128230;</div><p><strong>Scrivi anche solo parte del nome</strong> nella barra in alto.<br>La ricerca &egrave; istantanea &mdash; prova: <strong>fouta</strong>, <strong>trapunta</strong>, <strong>calze</strong>, <strong>plaid</strong>.<br>Usa i chip in alto per filtrare per scaffale.</p></div>';
    return;
  }
  const scInfo=activeSc?' su scaffale <b>'+activeSc+'</b>':'';
  const qInfo=raw?' per "<b>'+esc(raw)+'</b>"':'';
  barEl.innerHTML='<b>'+rows.length+'</b> risultati'+qInfo+scInfo;
  if(!rows.length){
    resEl.innerHTML='<div class="empty"><div class="ico">&#128269;</div><p>Nessun risultato.<br>Prova con meno lettere o parole diverse.</p></div>';
    return;
  }
  const ripianoLabel={A:'Rip. A (basso)',B:'Rip. B',C:'Rip. C',D:'Rip. D (alto)',E:'Rip. E'};
  resEl.innerHTML=rows.map(r=>{
    const [sc,rip,cel,cont]=r;
    const hi=terms.length?hlite(cont,terms):esc(cont);
    return '<div class="card">'
      +'<div class="badge"><div class="bs">'+esc(sc)+'</div><div class="br">RIP. '+rip+'</div><div class="bc">CELLA '+cel+'</div></div>'
      +'<div class="cb"><div class="cl">'+esc(sc)+' &rsaquo; '+(ripianoLabel[rip]||rip)+' &rsaquo; Cella '+cel+'</div>'
      +'<div class="ct">'+hi+'</div></div></div>';
  }).join('');
}
qEl.addEventListener('input',go);
clrEl.onclick=()=>{qEl.value='';activeSc=null;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));go();qEl.focus()};
document.addEventListener('keydown',e=>{if(e.key==='Escape'){qEl.value='';activeSc=null;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));go();qEl.focus()}});
